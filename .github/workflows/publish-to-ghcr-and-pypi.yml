name: Publish Docker 🐳 images 📦 to GitHub Container Registry

on:
  release:
    types: [created]
  workflow_dispatch: {}

# Explicitly grant the `secrets.GITHUB_TOKEN` no permissions.
permissions: {}

jobs:
  coverage-artifact:
    name: Build coverage artifact
    runs-on: ubuntu-latest
    env:
      NEO4J_DOCKER_IMAGE: neo4j:5-community
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install the project
        run: uv sync --frozen --all-extras --dev
      - name: Run combined coverage
        run: make test_coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-release
          path: coverage.xml
          if-no-files-found: warn

  # 1. Publish to PyPI
  build-and-publish-to-pypi:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build a binary wheel and a source tarball
        run: uv build
      - name: Publish distribution 📦 to PyPI
        if: github.event_name == 'release'
        # --check-url checks if files already exist on PyPI before uploading.
        # If the version already exists, it skips without failing, allowing
        # downstream jobs (Docker build) to proceed on re-runs.
        run: uv publish --check-url https://pypi.org/simple/ --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}

  # 2. Publish to GHCR
  build-and-publish-to-ghcr:
    # Explicitly grant the `secrets.GITHUB_TOKEN` permissions.
    name: Build and publish Docker 🐳 images 📦 to GitHub Container Registry
    needs: build-and-publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      # Grant the ability to write to GitHub Packages (push Docker images to
      # GitHub Container Registry).
      packages: write
      # Required for SBOM and provenance attestations
      id-token: write
      attestations: write
    steps:
      # See: https://docs.docker.com/build/ci/github-actions/multi-platform/#build-and-load-multi-platform-images
      - name: Set up Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5.2.0
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Only tag as 'latest' for stable releases (not prereleases)
          # Uses GitHub's prerelease flag to exclude all prerelease types (rc, alpha, beta, dev, etc.)
          flavor: |
            latest=false
          tags: |
            type=pep440,pattern={{version}}
            type=pep440,pattern={{major}}.{{minor}},enable=${{ !github.event.release.prerelease }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      # Install QEMU for multi-architecture builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          # This is the user that triggered the Workflow. In this case, it will
          # either be the user whom created the Release or manually triggered
          # the workflow_dispatch.
          username: ${{ github.actor }}
          # `secrets.GITHUB_TOKEN` is a secret that's automatically generated by
          # GitHub Actions at the start of a workflow run to identify the job.
          # This is used to authenticate against GitHub Container Registry.
          # See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#about-the-github_token-secret
          # for more detailed information.
          password: ${{ secrets.GITHUB_TOKEN }}

      # Get the cartography version from the GitHub release event metadata and
      # poll PyPI until the wheel is actually fetchable by pip. We don't poll
      # the JSON metadata API because it can report a version as available
      # before the wheel has propagated to the Fastly edges that pip/uv hit;
      # exercising `pip download` against the simple index matches what
      # `uv tool install` will do in the Docker build below.
      - name: Extract version and verify PyPI availability
        id: version
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Waiting for cartography==$VERSION to be installable from PyPI..."

          MAX_ATTEMPTS=60
          ATTEMPT=0
          TMPDIR=$(mktemp -d)
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if python3 -m pip download --no-deps --no-cache-dir \
                 --index-url https://pypi.org/simple/ \
                 --dest "$TMPDIR" \
                 "cartography==$VERSION" > /dev/null 2>&1; then
              echo "cartography==$VERSION is installable from PyPI"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: not yet installable, retrying in 10s..."
            sleep 10
          done

          echo "Timed out waiting for cartography==$VERSION on PyPI after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: Dockerfile
          context: .
          push: true # push the image to ghcr
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # e.g. '==0.98.0'
          build-args: VERSION_SPECIFIER===${{ env.VERSION }}
          # Generate SBOM (Software Bill of Materials) attestation
          sbom: true
          # Generate provenance attestation for supply chain security
          provenance: mode=max
