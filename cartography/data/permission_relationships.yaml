# Map principals that can read items from an S3Bucket. Specifically,
# create an (:AWSPrincipal)-[:CAN_READ]->(:S3Bucket) relationship
# for principals that have a policy attached with _any_ of the below
# permissions. Similar logic applies for the other entries in this file.
- target_label: S3Bucket
  permissions:
  - S3:GetObject
  relationship_name: CAN_READ
# Map principals that can write items to an S3Bucket.
- target_label: S3Bucket
  permissions:
  - S3:PutObject
  relationship_name: CAN_WRITE
# Map principals that can retrieve data from DynamoDB.
- target_label: DynamoDBTable
  permissions:
  - dynamodb:BatchGetItem
  - dynamodb:GetItem
  - dynamodb:GetRecords
  - dynamodb:Query
  - dynamodb:Scan
  relationship_name: CAN_QUERY
# Map principals that can write data to DynamoDB.
- target_label: DynamoDBTable
  permissions:
  - dynamodb:PutItem
  - dynamodb:UpdateItem
  - dynamodb:DeleteItem
  - dynamodb:BatchWriteItem
  relationship_name: CAN_WRITE
# Map principals that can retrieve secrets from Secrets Manager.
- target_label: SecretsManagerSecret
  permissions:
  - secretsmanager:GetSecretValue
  relationship_name: GET_SECRET
# Map principals that can administer RedshiftClusters.
- target_label: RedshiftCluster
  permissions:
  - redshift:*
  - redshift:CreateClusterUser
  - redshift:GetClusterCredentials
  - redshift:JoinGroup
  relationship_name: CAN_ADMINISTER
# Map principals that can query RDS instances via IAM database authentication.
- target_label: RDSInstance
  permissions:
  - rds-db:connect
  relationship_name: CAN_QUERY
# Map principals that can administer RDS instances.
- target_label: RDSInstance
  permissions:
  - rds:*
  - rds:ModifyDBInstance
  - rds:DeleteDBInstance
  - rds:RebootDBInstance
  - rds:StopDBInstance
  - rds:StartDBInstance
  relationship_name: CAN_ADMINISTER
# Map principals that can execute commands in ECS tasks.
- target_label: ECSTask
  permissions:
  - ecs:ExecuteCommand
  relationship_name: CAN_EXECUTE_COMMAND
# Map principals that can pass an IAM role to an AWS service.
# iam:PassRole is required to attach an instance profile to ec2:RunInstances,
# an execution role to lambda:CreateFunction, ecs:RunTask, etc. Combined with
# a service-launch permission this is a privilege-escalation primitive.
- target_label: AWSRole
  permissions:
  - iam:PassRole
  relationship_name: CAN_PASS_ROLE
# Map principals that can execute CloudFormation stacks.
- target_label: CloudFormationStack
  permissions:
  - cloudformation:UpdateStack
  relationship_name: CAN_EXEC
# Map principals that can open an SSM Session Manager shell on an EC2 instance.
# Two conditions must both hold (see issue #1643):
#   1. the principal has ssm:StartSession on the instance, and
#   2. the instance is actually managed by SSM, i.e. it has an
#      (:EC2Instance)-[:HAS_INFORMATION]->(:SSMInstanceInformation) edge.
# The target_precondition enforces (2) so we don't draw CAN_START_SESSION edges
# to instances the SSM agent never registered (where StartSession would fail).
- target_label: EC2Instance
  permissions:
  - ssm:StartSession
  relationship_name: CAN_START_SESSION
  target_precondition:
    related_label: SSMInstanceInformation
    relationship: HAS_INFORMATION
    direction: outgoing
